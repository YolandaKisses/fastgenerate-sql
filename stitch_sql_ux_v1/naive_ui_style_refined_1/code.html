<!doctype html>

<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-tertiary": "#ffffff",
              surface: "#f9f9ff",
              tertiary: "#954500",
              "on-tertiary-fixed-variant": "#753400",
              "inverse-on-surface": "#eef0fa",
              "on-surface": "#181c22",
              "on-background": "#181c22",
              "on-secondary-fixed": "#001c38",
              "surface-container-low": "#f1f3fd",
              "tertiary-container": "#bb5800",
              "secondary-container": "#bcd6fe",
              "primary-fixed-dim": "#a9c7ff",
              "surface-dim": "#d8dae3",
              "on-tertiary-fixed": "#321300",
              "surface-container-high": "#e6e8f1",
              "on-primary-fixed-variant": "#00468c",
              secondary: "#466082",
              "on-secondary": "#ffffff",
              "primary-container": "#0073e0",
              "outline-variant": "#c1c6d6",
              "on-secondary-container": "#435d7f",
              "surface-variant": "#e0e2ec",
              "on-primary-container": "#fefcff",
              "secondary-fixed-dim": "#aec8f0",
              "primary-fixed": "#d6e3ff",
              "tertiary-fixed-dim": "#ffb68b",
              outline: "#717785",
              "surface-container-lowest": "#ffffff",
              "on-secondary-fixed-variant": "#2e4869",
              "surface-container": "#ecedf7",
              "on-surface-variant": "#414753",
              "surface-tint": "#005db7",
              "surface-bright": "#f9f9ff",
              "on-primary": "#ffffff",
              primary: "#005bb3",
              "on-error-container": "#93000a",
              "inverse-surface": "#2d3038",
              "secondary-fixed": "#d3e4ff",
              "error-container": "#ffdad6",
              "on-tertiary-container": "#fffbff",
              "on-primary-fixed": "#001b3d",
              "surface-container-highest": "#e0e2ec",
              "tertiary-fixed": "#ffdbc8",
              background: "#f9f9ff",
              "on-error": "#ffffff",
              "inverse-primary": "#a9c7ff",
              error: "#ba1a1a",
            },
            borderRadius: {
              DEFAULT: "0.125rem",
              lg: "0.25rem",
              xl: "0.5rem",
              full: "0.75rem",
            },
            spacing: {
              gutter: "12px",
              sm: "8px",
              lg: "24px",
              md: "16px",
              unit: "4px",
              xl: "32px",
              xs: "4px",
              "panel-padding": "20px",
            },
            fontFamily: {
              h1: ["Inter"],
              h2: ["Inter"],
              "label-sm": ["Inter"],
              code: ["Monospace"],
              body: ["Inter"],
            },
            fontSize: {
              h1: ["20px", { lineHeight: "28px", fontWeight: "600" }],
              h2: ["16px", { lineHeight: "24px", fontWeight: "600" }],
              "label-sm": [
                "12px",
                {
                  lineHeight: "16px",
                  letterSpacing: "0.02em",
                  fontWeight: "500",
                },
              ],
              code: ["13px", { lineHeight: "20px", fontWeight: "400" }],
              body: ["14px", { lineHeight: "22px", fontWeight: "400" }],
            },
          },
        },
      };
    </script>
    <style>
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
        vertical-align: middle;
        font-size: 20px;
      }
      body {
        background-color: #fbfcfd;
      }
      .form-input-focus:focus {
        border-color: #2080f0;
        box-shadow: 0 0 0 2px rgba(32, 128, 240, 0.1);
        outline: none;
      }
    </style>
  </head>
  <body class="font-body text-on-surface antialiased">
    <div class="flex min-h-screen">
      <!-- Sidebar Navigation (Shared Component Logic Applied) -->
      <aside
        class="h-screen w-64 border-r border-[#efeff5] bg-[#fbfcfd] flex flex-col py-5 px-4 gap-y-2"
      >
        <div class="mb-6 px-2">
          <h1 class="text-lg font-semibold text-slate-900 tracking-tight">
            FastGenerate SQL
          </h1>
          <p class="text-xs text-slate-400">v1.2.0</p>
        </div>
        <nav class="flex flex-col gap-y-1">
          <a
            class="flex items-center gap-3 px-3 py-2 text-sm text-slate-500 hover:bg-slate-50 hover:text-slate-800 transition-colors duration-200"
            href="#"
          >
            <span class="material-symbols-outlined" data-icon="database"
              >database</span
            >
            <span>Workbench</span>
          </a>
          <a
            class="flex items-center gap-3 px-3 py-2 text-sm text-slate-500 hover:bg-slate-50 hover:text-slate-800 transition-colors duration-200"
            href="#"
          >
            <span class="material-symbols-outlined" data-icon="storage"
              >storage</span
            >
            <span>Data Sources</span>
          </a>
          <a
            class="flex items-center gap-3 px-3 py-2 text-sm text-slate-500 hover:bg-slate-50 hover:text-slate-800 transition-colors duration-200"
            href="#"
          >
            <span class="material-symbols-outlined" data-icon="history"
              >history</span
            >
            <span>Audit Logs</span>
          </a>
          <!-- Active Navigation: Settings -->
          <a
            class="relative flex items-center gap-3 px-3 py-2 text-sm text-[#2080f0] before:content-[''] before:absolute before:left-0 before:top-1/2 before:-translate-y-1/2 before:w-[3px] before:h-6 before:bg-[#2080f0] before:rounded-r-full font-medium"
            href="#"
          >
            <span class="material-symbols-outlined" data-icon="settings"
              >settings</span
            >
            <span>Settings</span>
          </a>
        </nav>
        <div
          class="mt-auto pt-4 border-t border-[#efeff5] px-2 flex items-center gap-3"
        >
          <div
            class="w-8 h-8 rounded-full bg-secondary-container flex items-center justify-center text-on-secondary-container text-xs font-bold"
          >
            UA
          </div>
          <div class="flex flex-col">
            <span class="text-xs font-medium text-slate-900">Admin</span>
            <span class="text-[10px] text-slate-400">admin@sqlai.io</span>
          </div>
        </div>
      </aside>
      <!-- Main Content Area -->
      <main class="flex-1 bg-white overflow-y-auto">
        <div class="max-w-4xl mx-auto py-16 px-gutter">
          <header class="mb-12">
            <h1 class="font-h1 text-h1 text-on-surface mb-2">系统设置</h1>
            <p class="font-body text-on-surface-variant">
              配置您的 FastGenerate SQL 工作区，调整模型连接及本地偏好。
            </p>
          </header>
          <!-- Model Configuration Section -->
          <section class="mb-12">
            <div
              class="flex items-center gap-2 mb-6 pb-2 border-b border-[#efeff5]"
            >
              <span
                class="material-symbols-outlined text-primary"
                data-icon="neurology"
                >neurology</span
              >
              <h2 class="font-h2 text-h2 text-on-surface">模型配置</h2>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-x-12 gap-y-8">
              <!-- Provider -->
              <div class="space-y-2">
                <label
                  class="block font-label-sm text-label-sm text-on-surface-variant"
                  >模型提供商</label
                >
                <select
                  class="w-full bg-white border border-[#efeff5] rounded-lg px-3 py-2 font-body text-body form-input-focus transition-all appearance-none"
                >
                  <option>OpenAI</option>
                  <option>Anthropic</option>
                  <option>Azure OpenAI</option>
                  <option>Local LLM (Ollama)</option>
                </select>
              </div>
              <!-- Base URL -->
              <div class="space-y-2">
                <label
                  class="block font-label-sm text-label-sm text-on-surface-variant"
                  >API 基础 URL</label
                >
                <input
                  class="w-full bg-white border border-[#efeff5] rounded-lg px-3 py-2 font-body text-body form-input-focus transition-all"
                  placeholder="https://api.openai.com/v1"
                  type="text"
                />
              </div>
              <!-- API Key -->
              <div class="space-y-2 md:col-span-2">
                <label
                  class="block font-label-sm text-label-sm text-on-surface-variant"
                  >API 密钥 (API Key)</label
                >
                <div class="relative">
                  <input
                    class="w-full bg-white border border-[#efeff5] rounded-lg px-3 py-2 pr-10 font-body text-body form-input-focus transition-all"
                    type="password"
                    value="sk-••••••••••••••••••••••••"
                  />
                  <button
                    class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600"
                  >
                    <span
                      class="material-symbols-outlined"
                      data-icon="visibility"
                      >visibility</span
                    >
                  </button>
                </div>
              </div>
              <!-- Context Window -->
            </div>
          </section>
          <!-- Application Settings Section -->
          <!-- Storage Settings Section -->
          <!-- Action Footer -->
          <footer
            class="pt-8 mt-12 border-t border-[#efeff5] flex justify-end gap-4"
          >
            <button
              class="px-6 py-2 font-body text-slate-500 hover:text-slate-800 transition-colors"
            >
              取消
            </button>
            <button
              class="px-8 py-2 bg-[#2080f0] text-white font-body font-medium rounded-lg shadow-sm hover:opacity-90 active:scale-[0.98] transition-all"
            >
              保存更改
            </button>
          </footer>
        </div>
      </main>
    </div>
  </body>
</html>
